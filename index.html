<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>GIRNAR CLOTH</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f6b4f">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Invoice App">
<style>
  :root{
    --ink:#1c2b24;
    --paper:#fbf9f4;
    --line:#d9d2c2;
    --accent:#2f6b4f;
    --accent-soft:#e7f0ea;
    --muted:#7a7468;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#e9e4d8;
    color:var(--ink);
    padding:24px 12px 80px;
  }
  .app{max-width:820px;margin:0 auto;}
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:16px;flex-wrap:wrap;gap:10px;
  }
  .topbar h1{font-size:18px;margin:0;letter-spacing:.5px;}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;}
  button{
    font-family:inherit;cursor:pointer;border:1px solid var(--line);
    background:#fff;color:var(--ink);border-radius:6px;padding:7px 12px;font-size:13px;
    transition:.15s;
  }
  button:hover{background:var(--accent-soft);border-color:var(--accent);}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  button.primary:hover{background:#255a41;}
  button.small{padding:4px 8px;font-size:12px;}
  .sheet{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:36px 40px;
    box-shadow:0 6px 24px rgba(0,0,0,.08);
  }
  .head{display:flex;justify-content:space-between;gap:20px;border-bottom:2px solid var(--accent);padding-bottom:18px;margin-bottom:22px;}
  .shopname{
    font-size:24px;font-weight:700;color:var(--accent);outline:none;
    min-width:200px;
  }
  .shopmeta{font-size:12.5px;color:var(--muted);line-height:1.6;outline:none;margin-top:4px;min-width:200px;}
  .invmeta{text-align:right;font-size:13px;line-height:1.9;}
  .invmeta .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-right:6px;}
  .invmeta [contenteditable]{outline:none;border-bottom:1px dashed var(--line);padding:0 2px;}
  .row2{display:flex;gap:24px;margin-bottom:20px;flex-wrap:wrap;}
  .field{flex:1;min-width:220px;}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:4px;}
  .field [contenteditable], .field input{
    outline:none;border:1px solid var(--line);border-radius:6px;
    padding:8px 10px;font-size:14px;width:100%;background:#fff;
  }
  select.schoolpick{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:#fff;}

  table{width:100%;border-collapse:collapse;margin-top:8px;}
  th{
    background:var(--accent-soft);color:var(--accent);text-align:left;
    font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    padding:9px 8px;border-bottom:2px solid var(--accent);
  }
  td{padding:7px 8px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top;}
  td[contenteditable]{outline:none;}
  td[contenteditable]:focus{background:var(--accent-soft);border-radius:4px;}
  .num{text-align:right;white-space:nowrap;}
  .qty-in,.price-in{width:60px;text-align:right;border:1px solid transparent;background:transparent;font-size:14px;font-family:inherit;padding:2px 4px;border-radius:4px;}
  .qty-in:focus,.price-in:focus{border-color:var(--line);background:#fff;}
  .rm{border:none;background:none;color:#b5544a;cursor:pointer;font-size:15px;padding:2px 6px;}
  .rm:hover{color:#8a382f;}

  .quickadd{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 4px;}
  .quickadd button{background:#fff;font-size:12.5px;padding:5px 10px;}

  .toolbar{display:flex;gap:6px;margin:20px 0 6px;}
  .toolbar button{width:30px;height:28px;padding:0;font-weight:700;}
  .toolbar button.i{font-style:italic;}
  .toolbar button.u{text-decoration:underline;}
  .notes{
    min-height:70px;border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;font-size:13.5px;outline:none;background:#fff;line-height:1.6;
  }

  .totals{margin-top:20px;display:flex;justify-content:flex-end;}
  .totals table{width:280px;}
  .totals td{border:none;padding:5px 8px;font-size:14px;}
  .totals .tlabel{color:var(--muted);}
  .totals .grand td{border-top:2px solid var(--accent);font-weight:700;font-size:16px;color:var(--accent);padding-top:10px;}
  .disc-in{width:70px;text-align:right;border:1px solid var(--line);border-radius:4px;padding:3px 6px;font-family:inherit;}

  .footer-note{margin-top:26px;text-align:center;font-size:12px;color:var(--muted);outline:none;}

  .addrow-wrap{margin-top:10px;}

  .savedbar{max-width:820px;margin:0 auto 14px;font-size:12.5px;color:#5a5348;}

  @media print{
    body{background:#fff;padding:0;}
    .topbar,.quickadd,.toolbar,.addrow-wrap,.rm,.savedbar{display:none !important;}
    .sheet{box-shadow:none;border:none;border-radius:0;padding:20px;}
    .app{max-width:100%;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>🧾 Uniform Invoice Maker</h1>
    <div class="btnrow">
      <button id="saveBtn">💾 Save</button>
      <button id="loadBtn">📂 Load Saved</button>
      <button id="newBtn">➕ New Invoice</button>
      <button class="primary" id="printBtn">🖨️ Print / Save PDF</button>
    </div>
  </div>
  <div class="savedbar" id="savedInfo"></div>

  <div class="sheet" id="sheet">
    <div class="head">
      <div>
        <div class="shopname" contenteditable="true" id="shopName">Your Uniform Shop</div>
        <div class="shopmeta" contenteditable="true" id="shopMeta">Shop Address, City, Gujarat<br>Phone: 9XXXXXXXXX &nbsp;|&nbsp; GSTIN: (if any)</div>
      </div>
      <div class="invmeta">
        <div><span class="lbl">Invoice #</span><span contenteditable="true" id="invNo">1001</span></div>
        <div><span class="lbl">Date</span><span contenteditable="true" id="invDate"></span></div>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Bill To (Customer / Parent Name)</label>
        <div contenteditable="true" id="custName" placeholder="Customer name"></div>
      </div>
      <div class="field">
        <label>School Name</label>
        <select class="schoolpick" id="schoolPick">
          <option value="">-- Select or type below --</option>
        </select>
        <div contenteditable="true" id="schoolName" style="margin-top:6px;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:14px;background:#fff;outline:none;" placeholder="Type school name..."></div>
      </div>
    </div>

    <div class="quickadd" id="quickadd"></div>

    <table id="itemTable">
      <thead>
        <tr>
          <th style="width:38%">Item</th>
          <th style="width:14%">Size</th>
          <th style="width:12%">Qty</th>
          <th style="width:16%">Price (₹)</th>
          <th style="width:16%" class="num">Amount (₹)</th>
          <th style="width:4%"></th>
        </tr>
      </thead>
      <tbody id="itemBody"></tbody>
    </table>

    <div class="addrow-wrap">
      <button id="addRowBtn" class="small">+ Add blank row</button>
    </div>

    <div class="toolbar">
      <span style="font-size:11px;color:var(--muted);align-self:center;margin-right:4px;">Notes formatting:</span>
      <button onclick="fmt('bold')" title="Bold">B</button>
      <button class="i" onclick="fmt('italic')" title="Italic">I</button>
      <button class="u" onclick="fmt('underline')" title="Underline">U</button>
    </div>
    <div class="notes" contenteditable="true" id="notes">Thank you for your purchase! Exchange within 7 days with bill.</div>

    <div class="totals">
      <table>
        <tr><td class="tlabel">Subtotal</td><td class="num" id="subtotal">₹0</td></tr>
        <tr><td class="tlabel">Discount (₹)</td><td class="num"><input class="disc-in" id="discount" type="number" value="0" min="0"></td></tr>
        <tr class="grand"><td>Total</td><td class="num" id="grandtotal">₹0</td></tr>
      </table>
    </div>

    <div class="footer-note" contenteditable="true" id="footerNote">— Vardhaan Apparel —</div>
  </div>
</div>

<script>
const SCHOOLS_KEY = 'schools_list';
const INVOICES_KEY_PREFIX = 'invoice:';
const COMMON_ITEMS = ['Shirt','Pant','T-Shirt','Skirt','Koti','Blazer','Tie','Belt','Track Pant','Sports Shirt','House T-Shirt'];

function todayStr(){
  const d = new Date();
  return d.toLocaleDateString('en-GB');
}
document.getElementById('invDate').textContent = todayStr();

// ---------- Item rows ----------
const itemBody = document.getElementById('itemBody');

function addRow(name='', size='', qty=1, price=0){
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td contenteditable="true" class="cell-name">${name}</td>
    <td contenteditable="true" class="cell-size">${size}</td>
    <td><input type="number" class="qty-in" value="${qty}" min="0"></td>
    <td><input type="number" class="price-in" value="${price}" min="0"></td>
    <td class="num amount">₹0</td>
    <td><button class="rm" title="Remove row">✕</button></td>
  `;
  itemBody.appendChild(tr);
  const qtyIn = tr.querySelector('.qty-in');
  const priceIn = tr.querySelector('.price-in');
  const amt = tr.querySelector('.amount');
  function recalc(){
    const q = parseFloat(qtyIn.value)||0;
    const p = parseFloat(priceIn.value)||0;
    amt.textContent = '₹' + (q*p).toFixed(2).replace(/\.00$/,'');
    calcTotals();
  }
  qtyIn.addEventListener('input', recalc);
  priceIn.addEventListener('input', recalc);
  tr.querySelector('.rm').addEventListener('click', ()=>{ tr.remove(); calcTotals(); });
  recalc();
}

document.getElementById('addRowBtn').addEventListener('click', ()=> addRow());

// quick-add buttons for common uniform items
const quickWrap = document.getElementById('quickadd');
COMMON_ITEMS.forEach(item=>{
  const b = document.createElement('button');
  b.textContent = '+ ' + item;
  b.addEventListener('click', ()=> addRow(item,'',1,0));
  quickWrap.appendChild(b);
});

function calcTotals(){
  let sub = 0;
  itemBody.querySelectorAll('tr').forEach(tr=>{
    const q = parseFloat(tr.querySelector('.qty-in').value)||0;
    const p = parseFloat(tr.querySelector('.price-in').value)||0;
    sub += q*p;
  });
  document.getElementById('subtotal').textContent = '₹' + sub.toFixed(2).replace(/\.00$/,'');
  const disc = parseFloat(document.getElementById('discount').value)||0;
  const grand = Math.max(sub - disc, 0);
  document.getElementById('grandtotal').textContent = '₹' + grand.toFixed(2).replace(/\.00$/,'');
}
document.getElementById('discount').addEventListener('input', calcTotals);

// start with a couple of blank rows
addRow('Shirt','',1,0);
addRow('Pant','',1,0);

// ---------- Bold/Italic/Underline for notes ----------
function fmt(cmd){
  document.getElementById('notes').focus();
  document.execCommand(cmd, false, null);
}

// ---------- School list (saved, reusable dropdown) ----------
const schoolSelect = document.getElementById('schoolPick');
const schoolNameField = document.getElementById('schoolName');

async function loadSchools(){
  try{
    const raw = localStorage.getItem(SCHOOLS_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
async function saveSchools(list){
  try{ localStorage.setItem(SCHOOLS_KEY, JSON.stringify(list)); }catch(e){}
}
function renderSchoolOptions(list){
  schoolSelect.innerHTML = '<option value="">-- Select or type below --</option>';
  list.forEach(s=>{
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    schoolSelect.appendChild(o);
  });
}
schoolSelect.addEventListener('change', ()=>{
  if(schoolSelect.value) schoolNameField.textContent = schoolSelect.value;
});
schoolNameField.addEventListener('blur', async ()=>{
  const val = schoolNameField.textContent.trim();
  if(!val) return;
  const list = await loadSchools();
  if(!list.includes(val)){
    list.push(val);
    await saveSchools(list);
    renderSchoolOptions(list);
  }
});
loadSchools().then(renderSchoolOptions);

// ---------- Save / Load invoices ----------
const savedInfo = document.getElementById('savedInfo');

function gatherInvoiceData(){
  const items = [];
  itemBody.querySelectorAll('tr').forEach(tr=>{
    items.push({
      name: tr.querySelector('.cell-name').textContent,
      size: tr.querySelector('.cell-size').textContent,
      qty: tr.querySelector('.qty-in').value,
      price: tr.querySelector('.price-in').value
    });
  });
  return {
    shopName: document.getElementById('shopName').innerHTML,
    shopMeta: document.getElementById('shopMeta').innerHTML,
    invNo: document.getElementById('invNo').textContent,
    invDate: document.getElementById('invDate').textContent,
    custName: document.getElementById('custName').textContent,
    schoolName: document.getElementById('schoolName').textContent,
    items,
    notes: document.getElementById('notes').innerHTML,
    discount: document.getElementById('discount').value,
    footerNote: document.getElementById('footerNote').innerHTML
  };
}

function applyInvoiceData(d){
  document.getElementById('shopName').innerHTML = d.shopName || 'Your Uniform Shop';
  document.getElementById('shopMeta').innerHTML = d.shopMeta || '';
  document.getElementById('invNo').textContent = d.invNo || '1001';
  document.getElementById('invDate').textContent = d.invDate || todayStr();
  document.getElementById('custName').textContent = d.custName || '';
  document.getElementById('schoolName').textContent = d.schoolName || '';
  itemBody.innerHTML = '';
  (d.items||[]).forEach(it=> addRow(it.name, it.size, it.qty, it.price));
  document.getElementById('notes').innerHTML = d.notes || '';
  document.getElementById('discount').value = d.discount || 0;
  document.getElementById('footerNote').innerHTML = d.footerNote || '';
  calcTotals();
}

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const data = gatherInvoiceData();
  const invNo = data.invNo || Date.now().toString();
  try{
    localStorage.setItem(INVOICES_KEY_PREFIX + invNo, JSON.stringify(data));
    savedInfo.textContent = '✅ Saved invoice #' + invNo;
  }catch(e){
    savedInfo.textContent = '⚠️ Could not save (storage error).';
  }
});

document.getElementById('loadBtn').addEventListener('click', async ()=>{
  try{
    const keys = Object.keys(localStorage).filter(k=>k.startsWith(INVOICES_KEY_PREFIX));
    if(keys.length===0){
      savedInfo.textContent = 'No saved invoices yet.';
      return;
    }
    const invNo = prompt('Saved invoice numbers:\n' + keys.map(k=>k.replace(INVOICES_KEY_PREFIX,'')).join(', ') + '\n\nType the invoice number to load:');
    if(!invNo) return;
    const raw = localStorage.getItem(INVOICES_KEY_PREFIX + invNo);
    if(raw){
      applyInvoiceData(JSON.parse(raw));
      savedInfo.textContent = '📂 Loaded invoice #' + invNo;
    }else{
      savedInfo.textContent = '⚠️ Invoice not found.';
    }
  }catch(e){
    savedInfo.textContent = '⚠️ Could not load saved invoices.';
  }
});

document.getElementById('newBtn').addEventListener('click', ()=>{
  if(!confirm('Start a new blank invoice? Unsaved changes will be lost.')) return;
  document.getElementById('custName').textContent = '';
  document.getElementById('schoolName').textContent = '';
  const nextNo = (parseInt(document.getElementById('invNo').textContent)||1000) + 1;
  document.getElementById('invNo').textContent = nextNo;
  document.getElementById('invDate').textContent = todayStr();
  itemBody.innerHTML = '';
  addRow('Shirt','',1,0);
  addRow('Pant','',1,0);
  document.getElementById('discount').value = 0;
  calcTotals();
});

document.getElementById('printBtn').addEventListener('click', ()=> window.print());

// Register service worker so the app works fully offline once installed
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
